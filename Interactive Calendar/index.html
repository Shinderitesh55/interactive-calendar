<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Wall Calendar | SWE Intern Task</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [viewDate, setViewDate] = useState(new Date());
            const [range, setRange] = useState({ start: null, end: null });
            const [memo, setMemo] = useState('');

            // Persistence: Load/Save from LocalStorage
            useEffect(() => {
                const saved = localStorage.getItem('cal_memo');
                if (saved) setMemo(saved);
            }, []);

            useEffect(() => {
                localStorage.setItem('cal_memo', memo);
            }, [memo]);

            // Calendar Calculations
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const monthName = viewDate.toLocaleString('default', { month: 'long' });
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();

            const handleDateClick = (day) => {
                const clicked = new Date(year, month, day);
                clicked.setHours(0, 0, 0, 0);

                if (!range.start || (range.start && range.end)) {
                    setRange({ start: clicked, end: null });
                } else if (clicked < range.start) {
                    setRange({ start: clicked, end: null });
                } else {
                    setRange({ ...range, end: clicked });
                }
            };

            const getDayClass = (day) => {
                const d = new Date(year, month, day);
                d.setHours(0, 0, 0, 0);
                const isStart = range.start?.getTime() === d.getTime();
                const isEnd = range.end?.getTime() === d.getTime();
                const isBetween = range.start && range.end && d > range.start && d < range.end;

                if (isStart) return "bg-blue-600 text-white rounded-l-lg shadow-md z-10 scale-105";
                if (isEnd) return "bg-blue-600 text-white rounded-r-lg shadow-md z-10 scale-105";
                if (isBetween) return "bg-blue-50 text-blue-600";
                return "text-gray-600 hover:bg-gray-100 rounded-md";
            };

            return (
                <div className="flex flex-col md:flex-row bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-200">
                    
                    {/* Visual Wall Calendar Side */}
                    <div className="md:w-5/12 relative min-h-[300px] bg-indigo-900">
                        <img 
                            src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1000" 
                            className="absolute inset-0 w-full h-full object-cover opacity-60"
                        />
                        {/* Decorative Binder Rings */}
                        <div className="absolute top-4 inset-x-0 flex justify-center gap-3">
                            {[...Array(8)].map((_, i) => (
                                <div key={i} className="w-1.5 h-6 bg-white/40 rounded-full border border-white/20" />
                            ))}
                        </div>
                        <div className="absolute bottom-10 left-10 text-white">
                            <h1 className="text-6xl font-black uppercase tracking-tighter">{monthName}</h1>
                            <p className="text-2xl font-light tracking-[0.3em] opacity-80">{year}</p>
                        </div>
                    </div>

                    {/* Interactive Calendar Side */}
                    <div className="md:w-7/12 p-8 md:p-12">
                        <div className="flex justify-between items-center mb-10">
                            <h2 className="text-2xl font-bold text-gray-800">{monthName} {year}</h2>
                            <div className="flex gap-2">
                                <button onClick={() => setViewDate(new Date(year, month - 1, 1))} className="p-2 border rounded-xl hover:bg-gray-50">←</button>
                                <button onClick={() => setViewDate(new Date(year, month + 1, 1))} className="p-2 border rounded-xl hover:bg-gray-50">→</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-7 text-center mb-4">
                            {['S','M','T','W','T','F','S'].map(d => (
                                <span key={d} className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{d}</span>
                            ))}
                        </div>

                        <div className="grid grid-cols-7 gap-y-1">
                            {[...Array(firstDay)].map((_, i) => <div key={i} />)}
                            {[...Array(daysInMonth)].map((_, i) => {
                                const day = i + 1;
                                return (
                                    <button
                                        key={day}
                                        onClick={() => handleDateClick(day)}
                                        className={`h-12 flex items-center justify-center text-sm font-bold transition-all ${getDayClass(day)}`}
                                    >
                                        {day}
                                    </button>
                                );
                            })}
                        </div>

                        <div className="mt-10 pt-8 border-t border-gray-100">
                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 block">Monthly Memos</label>
                            <textarea 
                                className="w-full h-24 p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 text-sm resize-none"
                                placeholder="Jot down notes..."
                                value={memo}
                                onChange={(e) => setMemo(e.target.value)}
                            />
                            {range.start && (
                                <p className="text-[10px] text-blue-500 font-bold mt-2 uppercase">
                                    Selection: {range.start.toLocaleDateString()} {range.end ? `— ${range.end.toLocaleDateString()}` : ''}
                                </p>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
